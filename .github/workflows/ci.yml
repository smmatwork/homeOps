name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

  agent-service-check:
    name: Agent Service (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/agent-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile main.py

      - name: Check channel adapters
        run: |
          python -m py_compile channel_dispatcher.py
          python -m py_compile channel_adapters/base.py
          python -m py_compile channel_adapters/whatsapp.py
          python -m py_compile channel_adapters/sms.py
          python -m py_compile channel_adapters/voice.py
          python -m py_compile channel_adapters/web.py

  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || 'placeholder' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/
          retention-days: 7

  docker-agent:
    name: Build Agent Docker Image
    runs-on: ubuntu-latest
    needs: [agent-service-check]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t homeops-agent-service:${{ github.sha }} services/agent-service/

      # Push to container registry when configured:
      # - name: Push to registry
      #   run: |
      #     docker tag homeops-agent-service:${{ github.sha }} ghcr.io/${{ github.repository }}/agent-service:latest
      #     docker push ghcr.io/${{ github.repository }}/agent-service:latest
